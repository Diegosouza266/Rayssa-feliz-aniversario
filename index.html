<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fw</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
        <header>
            <div class="logo">Feliz aniversario</div>
            
        </header>

        <section id="hero">
            <div class="hero-comteudo">
                <h1>seja a força que eles não conseguem ir contra</h1>
                <button id="btn-surpresa">Espero que esse momento faça você sorrir. </button>
                <br>
               <div class="frase-especial"><p>Talvez você nem perceba, mas o seu jeito marca as pessoas.</p> </div>
                
                <audio id="musica" loop>
                <source src="musica.mp3.mp3" type="audio/mpeg">
                
            
</audio>
            </div>
        </section>

       <section id="sobre">
        <div class="perfil-container">
            <img src="imagens/carro-de-frente.png" alt="Retrato sorridente da Rayssa" class="foto-perfil">
        
<img src="imagens/imagem-jornada.png" class="foto-jornada">
            <div class="texto-jornada">
                <h2>Sobre você</h2>
                <p>Tem algo no seu jeito que faz você ser impossível de passar despercebida.</p>
                <p>Quanto mais eu conheço você, mais eu gosto da pessoa que você é.</p>
                <P>Feliz aniversario !</P>

              
            </div>
        </div>
    </section>

    <section id="galeria">
        <div class="grid-galeria">
            <div class="item-galeria"><img src="imagens/imagem1.jpeg" alt="Detalhe do vestido"></div>
            <div class="item-galeria"><img src="imagens/imagem2.jpeg" alt="Logo da Audi"></div>
            <div class="item-galeria"><img src="imagens/imagem8.png" alt="Farol do carro"></div>
            <div class="item-galeria"><img src="imagens/imagem7.png" alt="Placa do carro"></div>
            <div class="item-galeria"><img src="imagens/imagem5.jpeg" alt="Traseira R8"></div>
            <div class="item-galeria"><img src="imagens/imagem6.jpeg" alt="Estilo noturno"></div>
        </div>
    </section>

   
   <script> const botao = document.getElementById("btn-surpresa");
const musica = document.getElementById("musica");

musica.volume = 0.2;

botao.addEventListener("click", function() {
    musica.play();
});
</script> 
    
</body>
</html>
